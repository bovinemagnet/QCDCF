# QCDCF Runtime Configuration

# Connector
qcdcf.connector.id=default-connector

# PostgreSQL Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/qcdcf
quarkus.datasource.username=qcdcf
quarkus.datasource.password=qcdcf

# CDC Source
qcdcf.source.slot-name=qcdcf_slot
qcdcf.source.publication-name=qcdcf_pub
qcdcf.source.chunk-size=1000

# Sink
qcdcf.sink.type=logging
qcdcf.sink.kafka.bootstrap-servers=localhost:9092
qcdcf.sink.kafka.topic-prefix=qcdcf

# Kafka producer config (used when sink.type=kafka)
kafka.bootstrap.servers=${qcdcf.sink.kafka.bootstrap-servers}

# Health
quarkus.smallrye-health.extensions.enabled=true

# Resilience
qcdcf.resilience.wal-retry.delay=1s
qcdcf.resilience.wal-retry.max-delay=60s
qcdcf.resilience.wal-retry.jitter=200ms
qcdcf.resilience.snapshot-retry.max-retries=3
qcdcf.resilience.snapshot-retry.delay=2s
qcdcf.resilience.sink-retry.max-retries=3
qcdcf.resilience.sink-retry.delay=500ms
qcdcf.resilience.sink-retry.timeout=5s
qcdcf.resilience.checkpoint-cb.failure-threshold=5
qcdcf.resilience.checkpoint-cb.window=10s
qcdcf.resilience.checkpoint-cb.half-open-delay=30s

# Health thresholds
qcdcf.health.wal-lag-threshold=60s
qcdcf.health.sustained-failure-threshold=10m

# Buffer limits
qcdcf.snapshot.max-buffer-size=100000

# Startup validation
qcdcf.connector.validate-on-startup=true

# Snapshot scheduling
qcdcf.snapshot.schedule.enabled=false
qcdcf.snapshot.schedule.cron=0 0 2 * * ?

# RabbitMQ sink (used when sink.type=rabbitmq)
qcdcf.sink.rabbitmq.host=localhost
qcdcf.sink.rabbitmq.port=5672
qcdcf.sink.rabbitmq.username=guest
qcdcf.sink.rabbitmq.password=guest
qcdcf.sink.rabbitmq.virtual-host=/
qcdcf.sink.rabbitmq.exchange-name=qcdcf
qcdcf.sink.rabbitmq.exchange-type=topic
