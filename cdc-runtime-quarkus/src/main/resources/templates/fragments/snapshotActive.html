<h2 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">Active Snapshot</h2>
{#if activeSnapshot != null}
<div class="space-y-3">
    <div class="flex justify-between">
        <span class="text-gray-400">Table</span>
        <span class="font-mono text-indigo-300">{activeSnapshot.tableName}</span>
    </div>
    <div class="flex justify-between items-center">
        <span class="text-gray-400">Status</span>
        <span class="inline-flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-blue-400 animate-pulse"></span>
            <span class="font-mono text-blue-400">RUNNING</span>
        </span>
    </div>
    <div class="flex justify-between">
        <span class="text-gray-400">Chunks Completed</span>
        <span class="font-mono text-gray-300">{activeSnapshot.chunksCompleted}</span>
    </div>
    <div class="flex justify-between">
        <span class="text-gray-400">Rows Read</span>
        <span class="font-mono text-gray-300">{activeSnapshot.rowsRead}</span>
    </div>
    <div class="flex justify-between">
        <span class="text-gray-400">Elapsed</span>
        <span class="font-mono text-gray-300">{activeSnapshot.duration}</span>
    </div>
</div>
{#else}
<p class="text-gray-500 text-sm italic">No active snapshot.</p>
{/if}

<!-- Snapshot trigger form -->
<div class="mt-6 pt-4 border-t border-gray-700">
    <h3 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Trigger Snapshot</h3>
    <form class="space-y-3">
        <input id="snapshotTableName" name="tableName" type="text" placeholder="public.my_table"
               class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
        <button type="button"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 px-4 rounded transition-colours"
                hx-post="/api/connector/snapshot"
                hx-vals='js:{"tableName": document.getElementById("snapshotTableName").value}'
                hx-headers='{"Content-Type": "application/json"}'
                hx-swap="none">
            Trigger Snapshot
        </button>
    </form>
</div>
