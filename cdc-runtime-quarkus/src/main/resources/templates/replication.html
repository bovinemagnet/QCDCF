<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCDCF — Replication Health</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <h1 class="text-xl font-bold text-indigo-400">Replication Health</h1>
            <div class="flex items-center gap-4">
                <a href="/dashboard" class="text-sm text-gray-400 hover:text-indigo-400">&larr; Dashboard</a>
                <a href="/dashboard/snapshots" class="text-sm text-gray-400 hover:text-indigo-400">Snapshots &amp; Watermarks &rarr;</a>
                <a href="/dashboard/history" class="text-sm text-gray-400 hover:text-indigo-400">Metrics History &rarr;</a>
                <a href="/dashboard/operations" class="text-sm text-gray-400 hover:text-indigo-400">Operations &rarr;</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">

        <!-- Top Row: Key Health Cards -->
        <div hx-get="/dashboard/fragments/replication-health"
             hx-trigger="every 5s"
             hx-swap="innerHTML">
            {#include fragments/replicationHealth /}
        </div>

        <!-- Second Row: Slot Details (full width) -->
        <div class="bg-gray-800 rounded-lg border border-gray-700 p-6"
             hx-get="/dashboard/fragments/replication-slot"
             hx-trigger="every 10s"
             hx-swap="innerHTML">
            {#include fragments/replicationSlotDetail /}
        </div>

        <!-- Third Row: Config + Lag History -->
        <div class="bg-gray-800 rounded-lg border border-gray-700 p-6"
             hx-get="/dashboard/fragments/replication-config"
             hx-trigger="every 10s"
             hx-swap="innerHTML">
            {#include fragments/replicationConfig /}
        </div>

        <!-- Bottom Row: Danger Zone (red accent) -->
        <div class="bg-gray-800 rounded-lg border border-gray-700 border-l-4 border-l-red-900/50 p-6"
             hx-get="/dashboard/fragments/replication-danger"
             hx-trigger="every 15s"
             hx-swap="innerHTML">
            {#include fragments/replicationDanger /}
        </div>

    </main>
</body>
</html>
